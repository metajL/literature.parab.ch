<blockquote class="pullquote" style="border-left: 3px solid #570030; padding: 1.5rem 2rem; margin: 2.5rem 0; background: #F2F0F0; border-radius: 0 12px 12px 0; font-size: 1.25rem; font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 600; line-height: 1.4; color: #1A1C1C;">
  {{ .Inner }}
  {{ with .Get "attribution" }}
  <cite style="display: block; margin-top: 0.75rem; font-size: 0.875rem; font-weight: 400; font-style: normal; color: #44474E;">— {{ . }}</cite>
  {{ end }}
</blockquote>
