<aside class="note" style="background: #F2F0F0; border-radius: 12px; padding: 1.25rem 1.5rem; margin: 2rem 0; font-size: 0.875rem; color: #44474E;">
  <strong style="display: block; font-family: 'Inter', sans-serif; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.08em; color: #570030; margin-bottom: 0.5rem;">{{ .Get "title" | default "Note" }}</strong>
  {{ .Inner }}
</aside>
