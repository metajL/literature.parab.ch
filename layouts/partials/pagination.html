{{ $pag := .Paginator }}
{{ if gt $pag.TotalPages 1 }}
<nav class="pagination" aria-label="Seitennavigation">
  {{ if $pag.HasPrev }}
  <a href="{{ $pag.Prev.URL }}" class="btn btn--ghost">&larr; Neuere</a>
  {{ else }}
  <span></span>
  {{ end }}
  <span class="pagination__info font-ui text-sm text-muted">
    Seite {{ $pag.PageNumber }} von {{ $pag.TotalPages }}
  </span>
  {{ if $pag.HasNext }}
  <a href="{{ $pag.Next.URL }}" class="btn btn--ghost">Ältere &rarr;</a>
  {{ else }}
  <span></span>
  {{ end }}
</nav>
{{ end }}
